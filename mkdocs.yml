site_name: VisionStudio
site_description: LLM-powered specification authoring and evaluation
site_url: https://productbuildershq.com/visionstudio
repo_url: https://github.com/ProductBuildersHQ/visionstudio
repo_name: ProductBuildersHQ/visionstudio

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Light mode first (ProductBuildersHQ default)
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

# ProductBuildersHQ Theme Assets (served from main site)
extra_css:
  - https://productbuildershq.com/css/productbuildershq-mkdocs.css

extra_javascript:
  - https://productbuildershq.com/js/site-nav.min.js
  - https://productbuildershq.com/js/pbhq-nav.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Projects: guide/projects.md
      - Workflows: guide/workflows.md
      - Methodology Selection: guide/methodologies.md
      - Editor: guide/editor.md
      - Evaluation: guide/evaluation.md
      - AIDLC Workflow: guide/aidlc.md
      - V2MOM Cascade: guide/v2mom.md
      - Capabilities: guide/capabilities.md
      - Roadmap: guide/roadmap.md
      - Maturity Model: guide/maturity.md
      - Organization: guide/organization.md
      - Sample Projects: guide/samples.md
  - API Reference:
      - AIDLC API: guide/aidlc-api.md
  - Architecture:
      - Overview: architecture/overview.md
      - Go Daemon: architecture/daemon.md
      - Frontend: architecture/frontend.md
  - Development:
      - Setup: development/setup.md
      - Contributing: development/contributing.md
  - Releases:
      - v0.2.0: releases/v0.2.0.md
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ProductBuildersHQ/visionstudio
